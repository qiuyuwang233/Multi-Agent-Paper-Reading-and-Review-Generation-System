<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>多 Agent 论文阅读与综述生成系统</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --border: #e5e7eb;
      --danger: #b91c1c;
      --success: #047857;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif;
      line-height: 1.6;
    }

    .container {
      width: min(1180px, calc(100% - 32px));
      margin: 32px auto;
    }

    .hero {
      padding: 28px;
      border-radius: 20px;
      background: linear-gradient(135deg, #eff6ff, #ffffff);
      border: 1px solid var(--border);
      box-shadow: 0 12px 36px rgba(15, 23, 42, 0.08);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 30px;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
    }

    .layout {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
    }

    label {
      display: block;
      margin: 14px 0 8px;
      font-weight: 700;
    }

    input[type="file"],
    textarea,
    select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      background: #fff;
      font: inherit;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    button {
      width: 100%;
      margin-top: 16px;
      border: 0;
      border-radius: 12px;
      padding: 13px 16px;
      background: var(--primary);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    button:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.65;
      transform: none;
    }

    .status {
      min-height: 26px;
      margin-top: 14px;
      color: var(--muted);
      font-size: 14px;
    }

    .status.error {
      color: var(--danger);
    }

    .status.ok {
      color: var(--success);
    }

    .meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .meta-item {
      padding: 12px;
      background: #f9fafb;
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--muted);
      word-break: break-all;
    }

    .meta-item strong {
      display: block;
      color: var(--text);
      margin-bottom: 4px;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 12px;
    }

    .tab {
      width: auto;
      margin: 0;
      padding: 10px;
      color: var(--text);
      background: #f3f4f6;
    }

    .tab.active {
      color: #fff;
      background: var(--primary);
    }

    .result {
      min-height: 460px;
      max-height: 680px;
      overflow: auto;
      padding: 18px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #0f172a;
      color: #e5e7eb;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: Consolas, "Microsoft YaHei", monospace;
      font-size: 14px;
    }

    .empty {
      color: var(--muted);
      padding: 32px;
      text-align: center;
      border: 1px dashed var(--border);
      border-radius: 14px;
      background: #fafafa;
    }

    .file-links {
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
    }

    .file-links div {
      margin-top: 4px;
      word-break: break-all;
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .tabs {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="hero">
      <h1>多 Agent 论文阅读与综述生成系统</h1>
      <p class="subtitle">上传论文 PDF，系统会自动生成精读笔记、Related Work、审稿意见和方法对比表。</p>
    </section>

    <section class="layout">
      <aside class="card">
        <h2>提交论文</h2>
        <form id="uploadForm">
          <label for="pdfFile">论文 PDF</label>
          <input id="pdfFile" name="file" type="file" accept="application/pdf,.pdf" required />

          <label for="request">关注点</label>
          <textarea id="request" name="request" placeholder="例如：重点关注方法创新、实验设置和可改进点。"></textarea>

          <label for="language">输出语言</label>
          <select id="language" name="language">
            <option value="zh" selected>中文</option>
            <option value="en">English</option>
          </select>

          <button id="submitBtn" type="submit">开始生成四类答复</button>
        </form>
        <div id="status" class="status">请选择 PDF 后提交。</div>
        <div class="file-links" id="fileLinks"></div>
      </aside>

      <section class="card">
        <div id="summary" class="meta" hidden>
          <div class="meta-item"><strong>论文标题</strong><span id="paperTitle"></span></div>
          <div class="meta-item"><strong>校验结果</strong><span id="critiqueSummary"></span></div>
        </div>

        <div id="emptyState" class="empty">结果会显示在这里。</div>

        <div id="resultPanel" hidden>
          <div class="tabs">
            <button class="tab active" data-key="notes" type="button">精读笔记</button>
            <button class="tab" data-key="related_work" type="button">Related Work</button>
            <button class="tab" data-key="reviews" type="button">审稿意见</button>
            <button class="tab" data-key="comparison_tables" type="button">方法对比表</button>
          </div>
          <pre id="resultText" class="result"></pre>
        </div>
      </section>
    </section>
  </main>

  <script>
    const form = document.querySelector("#uploadForm");
    const submitBtn = document.querySelector("#submitBtn");
    const statusEl = document.querySelector("#status");
    const resultPanel = document.querySelector("#resultPanel");
    const emptyState = document.querySelector("#emptyState");
    const resultText = document.querySelector("#resultText");
    const summary = document.querySelector("#summary");
    const paperTitle = document.querySelector("#paperTitle");
    const critiqueSummary = document.querySelector("#critiqueSummary");
    const fileLinks = document.querySelector("#fileLinks");
    const tabs = Array.from(document.querySelectorAll(".tab"));

    let currentOutputs = {};

    const labels = {
      notes: "精读笔记",
      related_work: "Related Work",
      reviews: "审稿意见",
      comparison_tables: "方法对比表",
    };

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const file = document.querySelector("#pdfFile").files[0];
      if (!file) {
        setStatus("请先选择 PDF 文件。", "error");
        return;
      }

      const formData = new FormData();
      formData.append("file", file);
      formData.append("request", document.querySelector("#request").value || "");
      formData.append("language", document.querySelector("#language").value || "zh");

      setLoading(true);
      setStatus("正在上传并生成结果，这可能需要几十秒到数分钟，请保持页面打开。");
      clearResults();

      try {
        const response = await fetch("/upload", {
          method: "POST",
          body: formData,
        });
        const data = await response.json();
        if (!response.ok || data.error) {
          throw new Error(data.error || `请求失败：${response.status}`);
        }

        currentOutputs = data.outputs || {};
        paperTitle.textContent = data.title || data.paper_id || "未识别标题";
        critiqueSummary.textContent = data.critique?.summary || "暂无校验信息";
        summary.hidden = false;
        renderFileLinks(data.output_files || {});
        showResult("notes");
        setStatus("生成完成。", "ok");
      } catch (error) {
        setStatus(error.message || "生成失败，请查看后端终端日志。", "error");
      } finally {
        setLoading(false);
      }
    });

    tabs.forEach((tab) => {
      tab.addEventListener("click", () => showResult(tab.dataset.key));
    });

    function showResult(key) {
      tabs.forEach((tab) => tab.classList.toggle("active", tab.dataset.key === key));
      emptyState.hidden = true;
      resultPanel.hidden = false;
      resultText.textContent = currentOutputs[key] || `暂无${labels[key]}内容。`;
    }

    function clearResults() {
      currentOutputs = {};
      resultPanel.hidden = true;
      emptyState.hidden = false;
      summary.hidden = true;
      fileLinks.innerHTML = "";
      resultText.textContent = "";
    }

    function renderFileLinks(files) {
      const entries = Object.entries(files);
      if (!entries.length) {
        fileLinks.innerHTML = "";
        return;
      }
      fileLinks.innerHTML = "<strong>已保存文件：</strong>" + entries
        .map(([key, value]) => `<div>${labels[key] || key}: ${escapeHtml(value)}</div>`)
        .join("");
    }

    function setLoading(isLoading) {
      submitBtn.disabled = isLoading;
      submitBtn.textContent = isLoading ? "生成中..." : "开始生成四类答复";
    }

    function setStatus(message, type = "") {
      statusEl.textContent = message;
      statusEl.className = `status ${type}`;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }
  </script>
</body>
</html>
